<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>FBX 快速预览器</title>
    <link rel="stylesheet" href="styles.css">

<script src="libs/three.min.js"></script>
<script src="libs/OrbitControls.js"></script>
<script src="libs/fflate.min.js"></script>
<script src="libs/FBXLoader.js"></script>
<script src="libs/DDSLoader.js"></script>
<script src="libs/TGALoader.js"></script>
<script src="libs/VertexNormalsHelper.js"></script>
<script src="libs/tween.min.js"></script>

</head>
<body>

    <!-- 修复后的文件菜单：加上了 class="ctx-menu" -->
        <div id="ctx-menu" class="ctx-menu">
        <!-- 通用功能 -->
        <div onclick="openItemInExplorer()">
            <span><span class="icon">📂</span>打开所在文件夹</span>
        </div>
        <div onclick="copyItemPath()">
            <span><span class="icon">📋</span>复制文件路径</span>
        </div>
        
        <!-- 网格模式专属功能 -->
        <div id="ctx-grid-only">
            <div class="menu-separator"></div> 
            <div onclick="smartFixThumbnails()">
            <span><span class="icon">🧹</span>智能修复异常缩略图</span>
            </div>
            <div onclick="manualSnapshot()">
                <span><span class="icon">📷</span>以当前视角截图</span>
            </div>
            <div onclick="forceRegenerate()">
                <span><span class="icon">↻</span>重新生成缩略图</span>
            </div>
        </div>
    </div>

        <div id="bg-ctx-menu" class="ctx-menu">
        <div onclick="smartFixThumbnails()">
            <span><span class="icon">🧹</span>智能修复异常缩略图</span>
        </div>
        <div onclick="regenerateAllThumbnails()">
            <span><span class="icon">↻</span>强制重新生成所有</span>
        </div>
        <div class="menu-separator"></div>
        <div onclick="openItemInExplorer()">
            <span><span class="icon">📂</span>打开当前文件夹</span>
        </div>
    </div>
    
    <!-- 3D 视口右键菜单 -->
    <div id="canvas-ctx-menu" class="ctx-menu">
        <div onclick="fitCamera()">🔍聚焦模型 <span class="shortcut">Z</span></div>
        <div onclick="resetCamera()">🔄复位相机 <span class="shortcut"></span></div>
        <div class="menu-separator"></div>
        <div onclick="toggleGrid()">📏切换地面网格 <span class="shortcut">G</span></div>
        <div onclick="toggleBgColor()">🌗切换背景深浅 <span class="shortcut"></span></div>
    </div>

    <div id="sidebar">
        <div id="sidebar-resizer" title="左右拖动调整宽度"></div>
        <div id="sidebar-inner-wrapper"> <!-- 🟢 包裹容器 -->
            <div id="sidebar-header">
                <div class="header-top-row">
                    <span>当前目录: <span id="dir-name">未选择</span></span>
                    <div class="header-actions" style="display:flex; gap:5px;">
                        <button id="history-btn" class="icon-btn-ghost" onclick="toggleHistory()" title="最近历史记录" style="background:transparent;border:none;color:#888;cursor:pointer;">🕒</button>
                        <button id="refresh-dir-btn" onclick="refreshCurrentDirectory()" title="重新索引当前目录" style="background:transparent;border:none;color:#888;cursor:pointer;">↻</button>
                    </div>
                </div>
                <div style="font-size:11px; color:#888; margin-top:4px;">
                    发现 <span id="file-count">0</span> 个 FBX 文件
                    <span id="progress-info"></span>
                </div>
                <div id="history-dropdown"></div>
            </div>
            
            <div id="web-upload-section">
                <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none">
                <button id="web-upload-btn" onclick="handleOpenFolder()">打开文件夹</button>
            </div>

            <div id="sort-bar">
                <select id="sort-type" class="sort-select" onchange="updateSort()">
                    <option value="name">按名称排序</option>
                    <option value="date" selected>按修改时间</option>
                </select>
                <button id="sort-order" class="sort-btn" onclick="toggleSortOrder()" title="切换升序/降序">⬇</button>
                <!-- 🟢 新增：仅显示收藏按钮 -->
                <button id="fav-filter-btn" class="sort-btn" onclick="toggleFavFilter()" style="margin-left: 5px;" title="仅显示收藏">★</button>
                <button id="thumb-toggle-btn" class="sort-btn" onclick="toggleViewMode()" style="margin-left: 5px;" title="切换 列表/缩略图 模式">⊞</button>
            </div>

            <div id="file-list" tabindex="0">
                <div style="padding:15px; color:#666; font-size:12px; text-align: center;">请选择文件夹加载模型</div>
            </div>
            <div id="file-grid" tabindex="0"></div>

            <div id="selected-path-section">
                <div style="font-size: 11px; color: #888; margin-bottom: 4px;">选中模型路径:</div>
                <div style="display: flex;">
                    <input type="text" id="selected-path-input" readonly placeholder="未选择文件">
                    <button class="icon-btn" id="copy-path-btn" onclick="copyPath()" title="复制完整路径">❐</button>
                    <button class="icon-btn" id="open-folder-btn" onclick="revealInExplorer()" title="打开所在文件夹">📂</button>
                </div>
            </div>

            <div id="search-container">
                <input type="text" id="search-input" placeholder="搜索文件..." oninput="filterFiles(this.value)">
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <!-- ViewCube 独立 Canvas -->
        <div id="viewcube-container">
            <canvas id="viewcube-canvas"></canvas>
        </div>

        <div id="drag-hint">释放鼠标以加载贴图</div>
        <div id="sidebar-toggle-btn" onclick="toggleSidebar()" title="折叠/展开侧边栏">◀</div>
        <div id="loading-overlay">加载中...</div>
        
        <div id="right-panel-container">
            <div id="controls-toggle-btn" onclick="toggleControls()" title="折叠/展开功能区">▶</div>
            <div id="controls">
                
                <select id="nav-mode" class="compact-select" onchange="updateNavigationMode()">
                    <option value="default">默认操作: 左键旋转 / 右键平移</option>
                    <option value="max">3dsMax: 中键平移 / Alt+中键旋转</option>
                </select>

                <div class="group-title">基础显示模式</div>
                
                <!-- 标准材质 (重置一切) -->
                <button id="btn-std" onclick="setBaseMaterial('standard')" class="active-btn">标准材质 (Standard)</button>
                
                <!-- 线框按钮：F4 和 F3 并排 -->
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <!-- 左边：F4 (实体+线框) -->
                    <button id="btn-edged" onclick="toggleF4Mode()" style="flex:1;">实体线框 (F4)</button>
                    <!-- 右边：F3 (纯线框) -->
                    <button id="btn-wire" onclick="toggleF3Mode()" style="flex:1;">纯线框 (F3)</button>
                </div>
                
                <!-- 并排布局：顶点颜色 & 顶点透明 -->
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <button id="btn-vcolor" onclick="setBaseMaterial('vertexColor')" style="flex:1;">顶点颜色 (Color)</button>
                    <button id="btn-valpha" onclick="setBaseMaterial('vertexAlpha')" style="flex:1;">顶点透明 (Alpha)</button>
                </div>

                <!-- 几何体工具：标题栏里放“位置”小按钮 -->
                <div class="group-title" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>几何体工具</span>
                    <!-- 默认状态：原始坐标 (没有 active-btn 类) -->
                    <button id="btn-origin" onclick="toggleOriginMode()" 
                            style="width: auto; padding: 2px 8px; font-size: 10px; height: 20px; margin:0; line-height:1;">
                        📍 原始坐标
                    </button>
                </div>
                
                <button id="btn-normals" onclick="toggleNormals()">显示法线 (Normals)</button>
                <button id="btn-side" onclick="toggleDoubleSided()" class="active-btn">双面显示: 开</button>

                <div class="group-title">相机与操作</div>
                <div style="display:flex; gap:5px;">
                    <button onclick="fitCamera()" class="action-btn" style="flex:1">聚焦 (Z)</button>
                    <button onclick="resetCamera()" class="action-btn" style="flex:1">复位 (Space)</button>
                </div>
                
                <div style="margin-top: 6px; font-size: 9px; color: #999; text-align: center;">
                    T顶 F前 L左 R右 P透视
                </div>

                <!-- UV 工具箱 -->
                <div class="group-title">UV 工具箱</div>
                <div style="display:flex; gap:5px;">
                    <button id="btn-uv" onclick="setBaseMaterial('uv')" style="flex:1;">启用贴图预览</button>
                    <button id="btn-uv-layout" onclick="toggleUVWindow()" style="flex:1;">显示 UV 展开图</button>
                </div>

                <!-- UV 控制面板 -->
                <div id="uv-control-panel">
                    <div style="font-size:10px; color:#666; margin-bottom:6px; text-align:center; border-bottom:1px solid #444; padding-bottom:4px;">
                        拖入图片替换贴图
                    </div>
                    <!-- 平铺 (Tiling) -->
                    <div class="max-row">
                        <span>平铺</span>
                        <div class="max-input-group">
                            <div class="max-field" title="按住拖动调整 U">
                                <!-- 🟢 加上了 id="lbl-tileU" -->
                                <span id="lbl-tileU">U</span>
                                <input type="number" id="tileU" value="1.0" step="0.1" oninput="updateUVMax()">
                            </div>
                            <div class="max-field" title="按住拖动调整 V">
                                <!-- 🟢 加上了 id="lbl-tileV" -->
                                <span id="lbl-tileV">V</span>
                                <input type="number" id="tileV" value="1.0" step="0.1" oninput="updateUVMax()">
                            </div>
                        </div>
                    </div>
                    <!-- 🟢 循环模式 Checkbox (移到平铺下面) -->
                    <div class="max-row" style="justify-content: flex-end; gap: 10px; margin-bottom: 8px;">
                        <label title="开启 U 方向循环" style="font-size:10px;"><input type="checkbox" id="wrapU" checked onchange="updateUVWrap()"> U 循环</label>
                        <label title="开启 V 方向循环" style="font-size:10px;"><input type="checkbox" id="wrapV" checked onchange="updateUVWrap()"> V 循环</label>
                    </div>

                    <!-- 偏移 (Offset) -->
                    <div class="max-row">
                        <span>偏移</span>
                        <div class="max-input-group">
                            <div class="max-field" title="按住拖动调整 U">
                                <!-- 🟢 加上了 id="lbl-offU" -->
                                <span id="lbl-offU">U</span>
                                <input type="number" id="offU" value="0.0" step="0.1" oninput="updateUVMax()">
                            </div>
                            <div class="max-field" title="按住拖动调整 V">
                                <!-- 🟢 加上了 id="lbl-offV" -->
                                <span id="lbl-offV">V</span>
                                <input type="number" id="offV" value="0.0" step="0.1" oninput="updateUVMax()">
                            </div>
                        </div>
                    </div>
                    
                    <!-- 流动动画 (新版：U/V 分离，数值放大100倍) -->
                    <div class="max-row" style="margin-top: 8px; border-top: 1px dashed #444; padding-top: 5px;">
                        <span>流动</span>
                        <div class="max-input-group">
                            <div class="max-field" title="按住拖动调整 U 流速">
                                <!-- 🟢 加上 id="lbl-flowU" 用于拖动 -->
                                <span id="lbl-flowU">U</span>
                                <!-- 初始值 0.0，代表静止 -->
                                <input type="number" id="flowU_val" value="0.0" step="0.1">
                            </div>
                            <div class="max-field" title="按住拖动调整 V 流速">
                                <!-- 🟢 加上 id="lbl-flowV" 用于拖动 -->
                                <span id="lbl-flowV">V</span>
                                <input type="number" id="flowV_val" value="0.0" step="0.1">
                            </div>
                        </div>
                    </div>
                    <button style="margin-top:8px; width:100%; padding:4px; background:#333; border:1px solid #555; color:#ccc; font-size:10px; cursor:pointer;" onclick="resetUVMax()">
                        重置 UV 参数 (Reset)
                    </button>
                </div> <!-- UV面板结束 -->

                <!-- 👇👇👇 必须补全这一块，否则 JS 会直接崩溃 👇👇👇 -->
                <div id="uv-layout-container">
                    <div id="uv-canvas-wrapper">
                        <canvas id="uv-canvas-2d"></canvas>
                        <div id="uv-helper-text">UV 布局预览</div>
                    </div>
                </div>
                <!-- 👆👆👆 补全结束 👆👆👆 -->

            </div>

        </div> <!-- right-panel-container 结束 -->

        <!-- ✅ 场景信息面板 (Scene HUD) - 放在 canvas-container 内部，但独立于 sidebar 和 controls -->
        <div id="scene-hud">
            <!-- 1. 网格控制 -->
            <div style="font-weight:bold; color:#aaa; font-size:11px;">地面网格 (Grid)</div>
            <select id="grid-size-select" class="hud-select" onchange="changeGridSystem()">
                <option value="small">小 (5m × 5m)</option>
                <option value="medium" selected>中 (50m × 50m)</option>
                <option value="large">大 (500m × 500m)</option>
            </select>
            <div id="grid-info-display" style="text-align:right; color:#ccc; font-size:11px; font-family:monospace;margin-top: 3px;">
                50m (1m/格)
            </div>

            <!-- 2. 统计信息 -->
            <div class="hud-row" style="margin-top:8px;">
                <div>顶点数:</div>
                <span id="stat-verts">0</span>
            </div>
            <div class="hud-row">
                <div>三角面:</div>
                <span id="stat-tris">0</span>
            </div>
        </div>

    </div>
    <script src="renderer.js"></script>
</body>
</html>
